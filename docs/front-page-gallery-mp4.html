<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>South Arkansas College Front Page Slideshow</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    .sr-only {
      position: absolute !important;
      width: 1px !important;
      height: 1px !important;
      padding: 0 !important;
      margin: -1px !important;
      overflow: hidden !important;
      clip: rect(0, 0, 0, 0) !important;
      white-space: nowrap !important;
      border: 0 !important;
    }

    body {
      margin: 0;
      font-family: 'Poppins', Arial, Helvetica, sans-serif;
    }

    .front-slider {
      max-width: 100%;
      margin: 0 auto;
    }

    .media-frame {
      position: relative;
      width: 100%;
      max-width: 100%;
      overflow: hidden;
    }

    .media-frame video {
      display: block;
      width: 100%;
      height: auto;
    }

    .active-cta-wrap {
      position: absolute;
      left: 50%;
      bottom: 30px;
      transform: translateX(-50%);
      z-index: 15;
      width: auto;
      max-width: calc(100% - 120px);
      text-align: center;
    }

    .cta-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 44px;
      padding: 12px 20px;
      border-radius: 6px;
      text-decoration: none;
      font-family: 'Poppins', Arial, Helvetica, sans-serif;
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1.2;
      border: 2px solid transparent;
      box-sizing: border-box;
      text-align: center;
      background: #8a2228;
      color: #ffffff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
    }

    .cta-link.light-blue {
      background: #84b9d0;
      color: #111111;
    }

    .cta-link.gold {
      background: #c49a6c;
      color: #111111;
    }

    .cta-link:focus,
    .icon-control:focus {
      outline: 3px solid #ffffff;
      outline-offset: 2px;
      border-color: #111111;
    }

    .icon-control {
      position: absolute;
      z-index: 20;
      width: 40px;
      height: 40px;
      min-width: 40px;
      min-height: 40px;
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,0.85);
      background: rgba(17,17,17,0.72);
      color: #ffffff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
      box-sizing: border-box;
      transition: background 0.2s ease;
    }

    .icon-control:hover {
      background: rgba(17,17,17,0.88);
    }

    .icon-control i {
      font-size: 14px;
      pointer-events: none;
    }

    .prev-control {
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
    }

    .next-control {
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
    }

    .pause-control {
      left: 12px;
      bottom: 12px;
    }

    @media (max-width: 768px) {
      .active-cta-wrap {
        bottom: 18px;
        max-width: calc(100% - 100px);
      }

      .cta-link {
        font-size: 1rem;
        padding: 10px 14px;
      }

      .icon-control {
        width: 38px;
        height: 38px;
        min-width: 38px;
        min-height: 38px;
      }

      .icon-control i {
        font-size: 13px;
      }

      .prev-control {
        left: 8px;
      }

      .next-control {
        right: 8px;
      }

      .pause-control {
        left: 8px;
        bottom: 8px;
      }
    }
  </style>
</head>
<body>

  <section class="front-slider" aria-labelledby="front-slider-heading">
    <h1 id="front-slider-heading" class="sr-only">South Arkansas College featured announcements</h1>

    <p id="front-slider-description" class="sr-only">
      This section includes an autoplaying promotional video with rotating featured announcements.
      Use the previous, next, or pause controls to move through the announcements or stop the motion.
    </p>

    <div class="media-frame">
      <video
        id="SouthArk"
        autoplay
        muted
        playsinline
        loop
        preload="metadata"
        aria-describedby="front-slider-description"
      >
        <source src="https://southarkcollege.github.io/website/front/frontpage-05072026.mp4" type="video/mp4">
        Your browser does not support the video tag.
      </video>

      <button
        type="button"
        id="prevSlide"
        class="icon-control prev-control"
        aria-label="Previous announcement"
        title="Previous announcement"
      >
        <i class="fa-solid fa-chevron-left" aria-hidden="true"></i>
      </button>

      <button
        type="button"
        id="nextSlide"
        class="icon-control next-control"
        aria-label="Next announcement"
        title="Next announcement"
      >
        <i class="fa-solid fa-chevron-right" aria-hidden="true"></i>
      </button>

      <div class="active-cta-wrap">
        <a
          id="activeCta"
          class="cta-link"
          href="https://www.southark.edu/page/apply-to-southark-today"
          target="_top"
          aria-label="Apply to SouthArk today"
        >
          <i class="fa-solid fa-rocket" aria-hidden="true"></i>
          <span>Apply Today!</span>
        </a>
      </div>

      <button
        type="button"
        id="motionToggle"
        class="icon-control pause-control"
        aria-controls="SouthArk"
        aria-pressed="false"
        aria-label="Pause motion"
        title="Pause motion"
      >
        <i class="fa-solid fa-pause" aria-hidden="true"></i>
      </button>
    </div>

    <div id="aria-live" class="sr-only" aria-live="polite" aria-atomic="true"></div>
  </section>

  <script>
    const video = document.getElementById('SouthArk');
    const prevSlideBtn = document.getElementById('prevSlide');
    const nextSlideBtn = document.getElementById('nextSlide');
    const motionToggle = document.getElementById('motionToggle');
    const activeCta = document.getElementById('activeCta');
    const liveRegion = document.getElementById('aria-live');

    const slides = [
      {
        start: 0,
        end: 7,
        // showButton: false,
        announce: 'Apply Today',
        text: 'Apply Today!',
        href: 'https://www.southark.edu/page/apply-to-southark-today',
        ariaLabel: 'Apply to South Arkansas College today',
        icon: 'fa-solid fa-rocket',
        className: 'cta-link'
      },
      {
        start: 7,
        end: 14,
        // showButton: false,
        announce: 'Visit the Shining Stars',
        text: 'Visit',
        href: 'https://www.southark.edu/o/sac/page/academic-shining-stars-may-2026',
        ariaLabel: 'Visit the Shining Stars',
        icon: 'fa-solid fa-star',
        className: 'cta-link'
      },
      {
        start: 14,
        end: 21,
        // showButton: false,
        announce: 'Register for Fall and Summer',
        text: 'Register',
        href: 'https://www.southark.edu/advising',
        ariaLabel: 'Register for Fall and Summer',
        icon: 'fa-solid fa-pencil',
        className: 'cta-link'
      },
      {
        start: 21,
        end: 28,
        // showButton: false,
        announce: 'Housing',
        text: 'Apply!',
        href: 'https://www.southark.edu/o/sac/page/housing',
        ariaLabel: 'Housing',
        icon: 'fa-solid fa-home',
        className: 'cta-link'
      },
      {
        start: 28,
        end: 35,
        // showButton: false,
        announce: 'Howard Hall Construction',
        text: 'Visit!',
        href: 'https://www.southark.edu/o/sac/page/howard-hall-construction',
        ariaLabel: 'Howard Hall Construction',
        icon: 'fa-solid fa-house',
        className: 'cta-link'
      },
      {
        start: 35,
        end: 42,
        // showButton: false,
        announce: 'Bill Howard Ballpark',
        text: 'Visit!',
        href: 'https://www.southark.edu/o/sac/page/bill-howard-ball-park',
        ariaLabel: 'Bill Howard Ballpark',
        icon: 'fa-solid fa-baseball',
        className: 'cta-link'
      }
//      {
//        start: 35,
//        end: 42,
        // showButton: false,
//        announce: 'MFA',
//        text: 'Learn More!',
//        href: 'https://www.southark.edu/page/multi-factor-authentication',
//        ariaLabel: 'MFA',
//        icon: 'fa-solid fa-lock',
//        className: 'cta-link'
//      }
    ];

    let currentSlideIndex = 0;
    let lastAnnouncement = '';

    function updateSlide(index, announce = true) {
      currentSlideIndex = (index + slides.length) % slides.length;
      const slide = slides[currentSlideIndex];


  // ADD THIS BLOCK
  if (slide.showButton === false) {
    activeCta.style.display = 'none';
  } else {
    activeCta.style.display = 'inline-flex';

    activeCta.href = slide.href;
    activeCta.className = slide.className;
    activeCta.setAttribute('aria-label', slide.ariaLabel);
    activeCta.innerHTML = `
      <i class="${slide.icon}" aria-hidden="true"></i>
      <span>${slide.text}</span>
    `;
  }
      

      activeCta.href = slide.href;
      activeCta.className = slide.className;
      activeCta.setAttribute('aria-label', slide.ariaLabel);
      activeCta.innerHTML = `
        <i class="${slide.icon}" aria-hidden="true"></i>
        <span>${slide.text}</span>
      `;

      if (announce && slide.announce !== lastAnnouncement) {
        liveRegion.textContent = slide.announce;
        lastAnnouncement = slide.announce;
      }
    }

    function syncSlideToTime() {
      const time = video.currentTime;
      const foundIndex = slides.findIndex(slide => time >= slide.start && time < slide.end);
      if (foundIndex !== -1 && foundIndex !== currentSlideIndex) {
        updateSlide(foundIndex, true);
      }
    }

    function goToSlide(index) {
      const safeIndex = (index + slides.length) % slides.length;
      currentSlideIndex = safeIndex;
      video.currentTime = slides[safeIndex].start + 0.05;
      updateSlide(safeIndex, true);
    }

    function setPauseState(isPaused) {
      motionToggle.setAttribute('aria-pressed', isPaused ? 'true' : 'false');
      motionToggle.setAttribute('aria-label', isPaused ? 'Play motion' : 'Pause motion');
      motionToggle.setAttribute('title', isPaused ? 'Play motion' : 'Pause motion');
      motionToggle.innerHTML = isPaused
        ? '<i class="fa-solid fa-play" aria-hidden="true"></i>'
        : '<i class="fa-solid fa-pause" aria-hidden="true"></i>';
    }

// Fix Forward Back
function getCurrentSlideIndexFromTime() {
  const time = video.currentTime;
  const foundIndex = slides.findIndex(
    slide => time >= slide.start && time < slide.end
  );
  return foundIndex !== -1 ? foundIndex : 0;
}
//
    
// Previous Next
prevSlideBtn.addEventListener('click', () => {
  video.pause();
  setPauseState(true);

  const actualIndex = getCurrentSlideIndexFromTime();
  goToSlide(actualIndex - 1);
});

nextSlideBtn.addEventListener('click', () => {
  video.pause();
  setPauseState(true);

  const actualIndex = getCurrentSlideIndexFromTime();
  goToSlide(actualIndex + 1);
});
//
    motionToggle.addEventListener('click', () => {
      if (video.paused) {
        video.play();
        setPauseState(false);
      } else {
        video.pause();
        setPauseState(true);
      }
    });

    video.addEventListener('timeupdate', syncSlideToTime);
    video.addEventListener('loadedmetadata', () => updateSlide(0, false));
    video.addEventListener('play', () => setPauseState(false));
    video.addEventListener('pause', () => setPauseState(true));
    video.addEventListener('ended', () => updateSlide(0, false));

    updateSlide(0, false);
    setPauseState(video.paused);
  </script>
</body>
</html>
